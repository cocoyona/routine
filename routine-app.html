<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" id="themeColor" content="#f7c948">
<title>My Routine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap');

:root {
  --acc:#f7c948; --acc-deep:#d4960a;
  --bg:#fffbf0; --text:#2e2000;
  --card:rgba(255,255,255,0.85); --sub:rgba(46,32,0,0.45);
  --border:rgba(0,0,0,0.07); --shadow:rgba(0,0,0,0.10);
}
body.night {
  --acc:#a78bfa; --acc-deep:#7c56f0;
  --bg:#0f0e17; --text:#ede9fe;
  --card:rgba(255,255,255,0.06); --sub:rgba(237,233,254,0.45);
  --border:rgba(255,255,255,0.09); --shadow:rgba(0,0,0,0.35);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body{font-family:'M PLUS Rounded 1c',-apple-system,sans-serif;background:var(--bg);color:var(--text);transition:background .5s,color .5s;min-height:100vh;overflow-x:hidden;}

/* flash */
#flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:999;transition:opacity .12s;}
#flash.on{opacity:.15;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:50;background:var(--bg);transition:background .5s;padding:14px 20px 0;}
.header-row{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:2px solid var(--acc);transition:border-color .5s;}
.app-name{font-size:20px;font-weight:900;letter-spacing:.03em;}
.header-actions{display:flex;gap:10px;align-items:center;}
.date-txt{font-size:12px;font-weight:600;color:var(--sub);}
.icon-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:2px 4px;opacity:.6;transition:opacity .15s;}
.icon-btn:active{opacity:1;}

/* ── NAV TABS ── */
.nav-tabs{display:flex;gap:0;padding:10px 20px 8px;border-bottom:1px solid var(--border);}
.nav-tab{flex:1;padding:8px 0;border:none;background:none;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;color:var(--sub);border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-1px;}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc);}

/* ── SLOT TABS ── */
.slot-tabs{display:flex;gap:8px;padding:10px 20px 8px;}
.slot-tab{flex:1;padding:9px 0;border:none;border-radius:14px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;background:var(--border);color:var(--sub);}
.slot-tab.active{background:var(--acc);color:#fff;box-shadow:0 3px 10px var(--shadow);}
body.night .slot-tab.active{color:#0f0e17;}

/* ── PROGRESS ── */
.prog-wrap{padding:0 20px 10px;display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:6px;border-radius:3px;background:var(--border);overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;background:var(--acc);transition:width .4s ease,background .5s;width:0%;}
.prog-lbl{font-size:12px;font-weight:800;color:var(--sub);min-width:34px;text-align:right;}

/* ══════════════════════════════
   FOCUS VIEW
══════════════════════════════ */
#focusView{display:none;flex-direction:column;align-items:center;padding:20px 24px 60px;min-height:calc(100vh - 160px);justify-content:center;}
#focusView.visible{display:flex;}
.focus-step{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.1em;margin-bottom:10px;}
.focus-name{font-size:26px;font-weight:900;text-align:center;line-height:1.3;margin-bottom:28px;}
.ring-wrap{position:relative;width:200px;height:200px;margin-bottom:28px;}
.ring-wrap svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:10;}
.ring-fg{fill:none;stroke:var(--acc);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .5s;}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-time{font-size:48px;font-weight:900;line-height:1;letter-spacing:-.02em;}
.ring-unit{font-size:13px;font-weight:700;color:var(--sub);margin-top:4px;}
.focus-btns{display:flex;gap:10px;width:100%;max-width:310px;}
.btn-skip{flex:1;padding:15px;border-radius:16px;border:none;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;background:var(--border);color:var(--text);transition:opacity .15s;}
.btn-done{flex:2;padding:15px;border-radius:16px;border:none;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;background:var(--acc);color:#fff;box-shadow:0 4px 14px var(--shadow);transition:background .5s,opacity .15s;}
body.night .btn-done{color:#0f0e17;}
.btn-skip:active,.btn-done:active{opacity:.75;}
.focus-next{margin-top:18px;font-size:12px;font-weight:600;color:var(--sub);}
@keyframes alarm-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
#focusView.alarm{animation:alarm-pulse .5s infinite;}

/* ══════════════════════════════
   LIST VIEW
══════════════════════════════ */
#listView{padding:0 20px 100px;}
.reset-btn{display:block;margin:4px auto 12px;padding:6px 16px;border-radius:20px;border:none;font-family:inherit;font-size:12px;font-weight:700;background:var(--border);color:var(--sub);cursor:pointer;}
.task-card{display:flex;align-items:center;gap:12px;padding:13px 14px;margin-bottom:8px;border-radius:18px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:transform .12s,opacity .25s,box-shadow .2s;-webkit-tap-highlight-color:transparent;user-select:none;backdrop-filter:blur(6px);}
.task-card.done{opacity:.4;}
.task-card:active{transform:scale(.97);}
.task-card.current{border-color:var(--acc);box-shadow:0 0 0 2px var(--acc);}
.task-card.dragging{opacity:.4;transform:scale(.97);}
.task-card.drag-over{border-color:var(--acc);border-style:dashed;}
.check{width:28px;height:28px;flex-shrink:0;border-radius:50%;border:2.5px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;transition:background .2s;}
.task-card.done .check{background:var(--acc);}
.task-info{flex:1;min-width:0;}
.task-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.drag-handle{font-size:22px;color:var(--sub);opacity:.35;cursor:grab;padding:4px 2px;touch-action:none;flex-shrink:0;}
.drag-handle:active{cursor:grabbing;}
.empty{text-align:center;padding:60px 20px;}
.empty-ico{font-size:52px;margin-bottom:14px;}
.empty-msg{font-size:14px;line-height:1.7;color:var(--sub);}
.all-done-banner{text-align:center;padding:40px 20px 20px;}
.all-done-ico{font-size:52px;margin-bottom:10px;}
.all-done-msg{font-size:22px;font-weight:900;margin-bottom:6px;}
.all-done-sub{font-size:13px;color:var(--sub);}

/* ══════════════════════════════
   CALENDAR VIEW
══════════════════════════════ */
#calView{display:none;padding:12px 20px 100px;}
#calView.visible{display:block;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav{background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;color:var(--text);opacity:.6;transition:opacity .15s;}
.cal-nav:active{opacity:1;}
.cal-month{font-size:18px;font-weight:900;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--sub);padding:4px 0;}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:700;position:relative;cursor:default;transition:background .15s;}
.cal-cell.other-month{opacity:.25;}
.cal-cell.today{background:var(--border);}
.cal-cell.has-data{cursor:pointer;}
.cal-cell .day-num{font-size:13px;font-weight:700;}
.cal-cell .dot-row{display:flex;gap:2px;margin-top:2px;}
.dot{width:5px;height:5px;border-radius:50%;}
.dot.morning{background:#f7c948;}
.dot.night{background:#a78bfa;}
.cal-cell .pct-badge{
  position:absolute;bottom:2px;right:3px;
  font-size:9px;font-weight:800;color:var(--sub);
}

/* detail panel */
.day-detail{margin-top:16px;padding:16px;border-radius:18px;background:var(--card);border:1.5px solid var(--border);display:none;}
.day-detail.visible{display:block;}
.detail-title{font-size:15px;font-weight:800;margin-bottom:12px;}
.slot-section{margin-bottom:14px;}
.slot-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.08em;margin-bottom:6px;}
.detail-task{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.detail-task:last-child{border-bottom:none;}
.detail-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0;}
.detail-check.done{background:var(--acc);}
.detail-name{font-size:13px;font-weight:600;}

/* ══════════════════════════════
   FAB
══════════════════════════════ */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;border:none;background:var(--acc);color:#fff;font-size:28px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 18px var(--shadow);cursor:pointer;z-index:40;transition:background .5s,transform .12s;font-family:inherit;}
body.night .fab{color:#0f0e17;}
.fab:active{transform:scale(.9);}
#calView.visible ~ .fab{display:none;}

/* ══════════════════════════════
   MODAL
══════════════════════════════ */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.open{opacity:1;pointer-events:all;}
.sheet{width:100%;background:#fff;color:#111;border-radius:24px 24px 0 0;padding:24px 20px 48px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;}
body.night .sheet{background:#1c1b2e;color:#ede9fe;}
.overlay.open .sheet{transform:translateY(0);}
.sheet-title{font-size:18px;font-weight:800;text-align:center;margin-bottom:20px;}
.form-lbl{font-size:12px;font-weight:700;opacity:.55;margin-bottom:6px;display:block;}
.form-inp{width:100%;padding:12px 14px;border-radius:12px;border:1.5px solid rgba(0,0,0,.1);font-family:inherit;font-size:15px;background:#f6f6f6;outline:none;transition:border-color .2s;margin-bottom:14px;}
body.night .form-inp{background:#2a2940;border-color:rgba(255,255,255,.12);color:#ede9fe;}
.form-inp:focus{border-color:var(--acc);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.chip{padding:6px 13px;border-radius:12px;border:1.5px solid rgba(0,0,0,.1);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:inherit;transition:all .15s;}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff;}
body.night .chip.on{color:#0f0e17;}
.btn-save{width:100%;padding:15px;border-radius:16px;border:none;background:var(--acc);color:#fff;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;margin-top:4px;transition:opacity .15s;}
body.night .btn-save{color:#0f0e17;}
.btn-save:active{opacity:.78;}
.btn-delete{width:100%;padding:11px;border-radius:16px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:#e05;opacity:.75;margin-top:2px;display:none;}
.btn-cancel{width:100%;padding:11px;border-radius:16px;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;color:inherit;opacity:.5;margin-top:2px;}

@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(247,201,72,0.5);}70%{box-shadow:0 0 0 8px transparent;}100%{box-shadow:0 0 0 0 transparent;}}
.task-card.current{animation:pulse-ring 2s infinite;}
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <div class="header-row">
    <div class="app-name">✨ My Routine</div>
    <div class="header-actions">
      <div class="date-txt" id="dateTxt"></div>
    </div>
  </div>
</header>

<!-- top nav: ルーティン / カレンダー -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('routine')">📋 ルーティン</button>
  <button class="nav-tab" onclick="showPage('calendar')">📅 完了履歴</button>
</div>

<!-- slot tabs (routine page only) -->
<div id="slotTabsWrap">
  <div class="slot-tabs">
    <button class="slot-tab active" data-slot="morning" onclick="switchSlot('morning')">🌅 朝</button>
    <button class="slot-tab" data-slot="night" onclick="switchSlot('night')">🌙 夜</button>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-lbl" id="progLbl">0%</div>
  </div>
</div>

<!-- FOCUS VIEW -->
<div id="focusView">
  <div class="focus-step" id="focusStep"></div>
  <div class="focus-name" id="focusName"></div>
  <div class="ring-wrap">
    <svg viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="90"/>
      <circle class="ring-fg" id="ringFg" cx="100" cy="100" r="90" stroke-dasharray="565" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-time" id="ringTime">—</div>
      <div class="ring-unit" id="ringUnit"></div>
    </div>
  </div>
  <div class="focus-btns">
    <button class="btn-skip" onclick="skipTask()">スキップ</button>
    <button class="btn-done" onclick="doneTask()">✓ 完了！</button>
  </div>
  <div class="focus-next" id="focusNext"></div>
</div>

<!-- LIST VIEW -->
<div id="listView"></div>

<!-- CALENDAR VIEW -->
<div id="calView">
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">‹</button>
    <div class="cal-month" id="calMonth"></div>
    <button class="cal-nav" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="day-detail" id="dayDetail"></div>
</div>

<button class="fab" onclick="openAdd()">＋</button>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-title" id="sheetTitle">タスクを追加</div>
    <label class="form-lbl">タスク名</label>
    <input class="form-inp" id="inpName" placeholder="例：ストレッチ" maxlength="30">
    <label class="form-lbl">所要時間（分）※0=タイマーなし</label>
    <input class="form-inp" id="inpDur" type="number" placeholder="5" min="0" max="120">
    <label class="form-lbl">時間帯</label>
    <div class="chip-row" id="chipSlot">
      <button class="chip on" data-s="morning" onclick="pickSlot(this)">🌅 朝</button>
      <button class="chip" data-s="night" onclick="pickSlot(this)">🌙 夜</button>
    </div>
    <label class="form-lbl">曜日（未選択＝毎日）</label>
    <div class="chip-row" id="chipDays">
      <button class="chip" data-d="0" onclick="toggleDay(this)">日</button>
      <button class="chip" data-d="1" onclick="toggleDay(this)">月</button>
      <button class="chip" data-d="2" onclick="toggleDay(this)">火</button>
      <button class="chip" data-d="3" onclick="toggleDay(this)">水</button>
      <button class="chip" data-d="4" onclick="toggleDay(this)">木</button>
      <button class="chip" data-d="5" onclick="toggleDay(this)">金</button>
      <button class="chip" data-d="6" onclick="toggleDay(this)">土</button>
    </div>
    <button class="btn-save" onclick="saveTask()">保存する</button>
    <button class="btn-delete" id="btnDelete" onclick="deleteTask()">このタスクを削除</button>
    <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════
const TODAY = new Date();
const TODAY_KEY = fmtDate(TODAY);
const DOW = TODAY.getDay();
const DAY_NAMES = ['日','月','火','水','木','金','土'];
const CIRC = 565; // 2π×90

function fmtDate(d){ return d.toISOString().slice(0,10); }

// ══════════════════════════════════════
//  STATE
// ══════════════════════════════════════
let tasks = [];
let doneToday = {};        // {taskId: true}  — today only
let history = {};          // {"YYYY-MM-DD": {taskId: true}}
let activeSlot = 'morning';
let currentPage = 'routine';
let editId = null;
let formSlot = 'morning';
let formDays = [];
let timerInterval = null;
let timerRemain = 0;
let timerTotal = 0;
let currentTaskId = null;
let calYear, calMonth;


// ══════════════════════════════════════
//  PERSIST
// ══════════════════════════════════════
function load(){
  try{
    tasks = JSON.parse(localStorage.getItem('rt3_tasks')||'[]');
    const raw = JSON.parse(localStorage.getItem('rt3_done')||'{}');
    doneToday = raw.date===TODAY_KEY ? (raw.done||{}) : {};
    history = JSON.parse(localStorage.getItem('rt3_hist')||'{}');
  }catch(e){ tasks=[]; doneToday={}; history={}; }
}
function persist(){
  localStorage.setItem('rt3_tasks', JSON.stringify(tasks));
  localStorage.setItem('rt3_done', JSON.stringify({date:TODAY_KEY, done:doneToday}));
  // merge today into history
  history[TODAY_KEY] = {...doneToday};
  localStorage.setItem('rt3_hist', JSON.stringify(history));
}

// ══════════════════════════════════════
//  THEME
// ══════════════════════════════════════
function applyTheme(slot){
  document.body.className = slot==='night'?'night':'';
  document.getElementById('themeColor').content = slot==='night'?'#0f0e17':'#f7c948';
}
function doFlash(){
  const el=document.getElementById('flash');
  el.style.background=activeSlot==='night'?'#a78bfa':'#f7c948';
  el.classList.add('on');
  setTimeout(()=>el.classList.remove('on'),280);
}

// ══════════════════════════════════════
//  PAGE SWITCHING
// ══════════════════════════════════════
function showPage(p){
  currentPage=p;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.textContent.includes(p==='routine'?'ルーティン':'履歴')));
  document.getElementById('slotTabsWrap').style.display = p==='routine'?'':'none';
  document.getElementById('focusView').classList.toggle('visible', p==='routine' && !!currentTaskId);
  document.getElementById('listView').style.display = p==='routine'?'':'none';
  document.getElementById('calView').classList.toggle('visible', p==='calendar');
  if(p==='calendar') renderCalendar();
}

// ══════════════════════════════════════
//  SLOT
// ══════════════════════════════════════
function switchSlot(s){
  stopTimer(); currentTaskId=null;
  activeSlot=s; applyTheme(s);
  document.querySelectorAll('.slot-tab').forEach(t=>t.classList.toggle('active',t.dataset.slot===s));
  renderRoutine();
}

// ══════════════════════════════════════
//  TODAY LIST
// ══════════════════════════════════════
function todayList(slot){
  slot=slot||activeSlot;
  return tasks.filter(t=>t.slot===slot&&(t.days.length===0||t.days.includes(DOW)));
}

// ══════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════
function render(){ renderDate(); renderProgress(); renderRoutine(); }

function renderDate(){
  const d=TODAY;
  document.getElementById('dateTxt').textContent=`${d.getMonth()+1}/${d.getDate()}（${DAY_NAMES[DOW]}）`;
}
function renderProgress(){
  const all=todayList();
  const cnt=all.filter(t=>doneToday[t.id]).length;
  const pct=all.length?Math.round(cnt/all.length*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=pct+'%';
}

function renderRoutine(){
  const all=todayList();
  const fv=document.getElementById('focusView');
  const lv=document.getElementById('listView');
  if(currentTaskId){
    const t=tasks.find(t=>t.id===currentTaskId);
    if(t){ fv.classList.add('visible'); lv.style.display='none'; renderFocus(t,all); return; }
  }
  fv.classList.remove('visible');
  lv.style.display='block';
  renderList(all);
}

// ── FOCUS ──────────────────────────
function renderFocus(t,all){
  const idx=all.findIndex(x=>x.id===t.id);
  document.getElementById('focusStep').textContent=`${idx+1} / ${all.length}`;
  document.getElementById('focusName').textContent=t.name;
  const undone=all.filter(x=>!doneToday[x.id]&&x.id!==t.id);
  document.getElementById('focusNext').textContent=undone[0]?`次：${undone[0].name}`:'🎉 これが最後です！';
  updateRing();
}
function updateRing(){
  const frac=timerTotal>0?timerRemain/timerTotal:1;
  document.getElementById('ringFg').style.strokeDashoffset=CIRC*(1-frac);
  const rt=document.getElementById('ringTime'), ru=document.getElementById('ringUnit');
  if(timerTotal===0){rt.textContent='—';ru.textContent='タイマーなし';}
  else if(timerRemain<=0){rt.textContent='0';ru.textContent='秒';}
  else{
    const m=Math.floor(timerRemain/60),s=timerRemain%60;
    rt.textContent=m>0?`${m}:${String(s).padStart(2,'0')}`:s;
    ru.textContent='残り';
  }
}

// ── LIST ───────────────────────────
function renderList(all){
  const lv=document.getElementById('listView');
  lv.innerHTML='';
  if(!all.length){
    lv.innerHTML=`<div class="empty"><div class="empty-ico">🎵</div><div class="empty-msg">この時間帯のルーティンはまだありません。<br>＋ボタンで追加しましょう！</div></div>`;
    return;
  }
  const allDone=all.every(t=>doneToday[t.id]);
  if(allDone){
    const b=document.createElement('div');
    b.className='all-done-banner';
    b.innerHTML='<div class="all-done-ico">🌟</div><div class="all-done-msg">全部完了！</div><div class="all-done-sub">素晴らしい。今日も一歩前進しました。</div>';
    lv.appendChild(b);
  }
  const rst=document.createElement('button');
  rst.className='reset-btn';
  rst.textContent='チェックをリセット';
  rst.onclick=()=>{ all.forEach(t=>delete doneToday[t.id]); currentTaskId=null; stopTimer(); persist(); render(); };
  lv.appendChild(rst);

  const current=all.find(t=>!doneToday[t.id]);

  all.forEach((t,i)=>{
    const isDone=!!doneToday[t.id];
    const isCurr=!isDone&&current&&t.id===current.id;
    const card=document.createElement('div');
    card.className='task-card'+(isDone?' done':'')+(isCurr?' current':'');
    card.draggable=true;
    card.dataset.idx=i;
    const dayStr=t.days.length===0?'毎日':t.days.map(d=>DAY_NAMES[d]).join('・');
    const durStr=t.duration?t.duration+'分':'';
    card.innerHTML=`
      <div class="check">${isDone?'✓':''}</div>
      <div class="task-info">
        <div class="task-name">${esc(t.name)}</div>
        <div class="task-sub">${[durStr,dayStr].filter(Boolean).join('・')}</div>
      </div>
      <div class="drag-handle" title="ドラッグで並び替え">⠿</div>`;

    // tap
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('drag-handle'))return;
      if(isDone){ delete doneToday[t.id]; persist(); render(); return; }
      startTask(t);
    });
    // long press → edit
    let pt;
    card.addEventListener('pointerdown',ev=>{
      if(ev.target.classList.contains('drag-handle'))return;
      pt=setTimeout(()=>openEdit(t.id),600);
    });
    card.addEventListener('pointerup',()=>clearTimeout(pt));
    card.addEventListener('pointercancel',()=>clearTimeout(pt));

    // ── TOUCH DRAG (mobile sort via handle) ──
    setupTouchDrag(card, i, lv);

    lv.appendChild(card);
  });
}

// ══════════════════════════════════════
//  TOUCH DRAG (mobile sort)
// ══════════════════════════════════════
// Move task at fromIdx to toIdx within the today-filtered list of the active slot.
// Both are indices into todayList(activeSlot).
function reorderTasks(fromIdx, toIdx){
  if(fromIdx === toIdx) return;
  const slotList = todayList(activeSlot);
  const fromId = slotList[fromIdx].id;
  const toId   = slotList[toIdx].id;
  // find positions in master tasks array
  const fi = tasks.findIndex(t=>t.id===fromId);
  const [moved] = tasks.splice(fi, 1);
  // after splice, find new position of toId
  const ti = tasks.findIndex(t=>t.id===toId);
  // insert after toId if moving down, before toId if moving up
  tasks.splice(fromIdx < toIdx ? ti+1 : ti, 0, moved);
  persist(); render();
}

function setupTouchDrag(card, srcIdx, container){
  const handle = card.querySelector('.drag-handle');
  let clone=null, startY=0, origTop=0, insertIdx=null;

  handle.addEventListener('touchstart',e=>{
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    startY = e.touches[0].clientY;
    origTop = rect.top;
    clone = card.cloneNode(true);
    clone.style.cssText = "position:fixed;left:"+rect.left+"px;top:"+rect.top+"px;width:"+rect.width+"px;opacity:0.85;z-index:500;pointer-events:none;border-radius:18px;box-shadow:0 8px 24px rgba(0,0,0,0.25);transition:none;";
    document.body.appendChild(clone);
    card.style.opacity = '0.25';
    insertIdx = srcIdx;
  },{passive:false});

  handle.addEventListener('touchmove',e=>{
    if(!clone) return;
    e.preventDefault();
    const dy = e.touches[0].clientY - startY;
    clone.style.top = (origTop + dy) + 'px';
    const cy = e.touches[0].clientY;
    const cards = [...container.querySelectorAll('.task-card')];
    let found = srcIdx;
    cards.forEach((c,i)=>{
      const r = c.getBoundingClientRect();
      const mid = r.top + r.height/2;
      if(cy > mid) found = i;
    });
    insertIdx = found;
    cards.forEach((c,i)=>c.classList.toggle('drag-over', i===insertIdx && i!==srcIdx));
  },{passive:false});

  handle.addEventListener('touchend',()=>{
    if(!clone) return;
    document.body.removeChild(clone); clone=null;
    card.style.opacity='';
    container.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    if(insertIdx !== null && insertIdx !== srcIdx){
      reorderTasks(srcIdx, insertIdx);
    }
    insertIdx = null;
  });
}

// ══════════════════════════════════════
//  TASK FLOW
// ══════════════════════════════════════
function startTask(t){
  stopTimer();
  currentTaskId=t.id;
  timerTotal=(t.duration||0)*60;
  timerRemain=timerTotal;
  renderRoutine();
  if(timerTotal>0){
    timerInterval=setInterval(()=>{
      timerRemain--;
      if(timerRemain<=0){
        timerRemain=0; clearInterval(timerInterval); timerInterval=null;
        document.getElementById('focusView').classList.add('alarm');
        if(navigator.vibrate)navigator.vibrate([200,100,200]);
      }
      updateRing();
    },1000);
  }
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  document.getElementById('focusView').classList.remove('alarm');
}
function doneTask(){
  if(!currentTaskId)return;
  doneToday[currentTaskId]=true;
  doFlash(); stopTimer(); persist();
  const undone=todayList().filter(t=>!doneToday[t.id]);
  if(undone.length){ startTask(undone[0]); }
  else{ currentTaskId=null; render(); }
}
function skipTask(){
  if(!currentTaskId)return;
  stopTimer();
  const undone=todayList().filter(t=>!doneToday[t.id]&&t.id!==currentTaskId);
  if(undone.length){ startTask(undone[0]); }
  else{ currentTaskId=null; render(); }
}

// ══════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════
function renderCalendar(){
  const y=calYear, m=calMonth;
  const MONTH_NAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calMonth').textContent=`${y}年 ${MONTH_NAMES[m]}`;

  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  DAY_NAMES.forEach(d=>{
    const el=document.createElement('div');
    el.className='cal-dow'; el.textContent=d; grid.appendChild(el);
  });

  const first=new Date(y,m,1);
  const lastDay=new Date(y,m+1,0).getDate();
  const startDow=first.getDay();

  // prev month padding
  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDow-1;i>=0;i--){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<span class="day-num">${prevLast-i}</span>`;
    grid.appendChild(cell);
  }

  for(let d=1;d<=lastDay;d++){
    const dateKey=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateKey===TODAY_KEY;
    const hist=history[dateKey]||{};
    const doneIds=Object.keys(hist).filter(k=>hist[k]);

    // tasks that were applicable that day
    const dow=new Date(y,m,d).getDay();
    const applicable=tasks.filter(t=>t.days.length===0||t.days.includes(dow));
    const morningTasks=applicable.filter(t=>t.slot==='morning');
    const nightTasks=applicable.filter(t=>t.slot==='night');
    const morningDone=morningTasks.filter(t=>doneIds.includes(t.id)).length;
    const nightDone=nightTasks.filter(t=>doneIds.includes(t.id)).length;
    const totalApplicable=applicable.length;
    const totalDone=doneIds.filter(id=>applicable.find(t=>t.id===id)).length;

    const cell=document.createElement('div');
    cell.className='cal-cell'+(isToday?' today':'')+(totalApplicable>0&&doneIds.length>0?' has-data':'');
    cell.innerHTML=`<span class="day-num">${d}</span>`;

    if(totalApplicable>0){
      const dots=document.createElement('div');
      dots.className='dot-row';
      if(morningTasks.length>0){
        const dot=document.createElement('div');
        dot.className='dot morning';
        dot.style.opacity=morningDone>0?'1':'.2';
        dots.appendChild(dot);
      }
      if(nightTasks.length>0){
        const dot=document.createElement('div');
        dot.className='dot night';
        dot.style.opacity=nightDone>0?'1':'.2';
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
      if(totalDone>0){
        const badge=document.createElement('div');
        badge.className='pct-badge';
        badge.textContent=Math.round(totalDone/totalApplicable*100)+'%';
        cell.appendChild(badge);
      }
    }

    if(doneIds.length>0||isToday){
      cell.addEventListener('click',()=>showDayDetail(dateKey, dow));
    }
    grid.appendChild(cell);
  }

  // next month padding
  const total=startDow+lastDay;
  const remain=(7-total%7)%7;
  for(let d=1;d<=remain;d++){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<span class="day-num">${d}</span>`;
    grid.appendChild(cell);
  }
}

function showDayDetail(dateKey, dow){
  const detail=document.getElementById('dayDetail');
  const hist=history[dateKey]||{};
  const applicable=tasks.filter(t=>t.days.length===0||t.days.includes(dow));
  const morningTasks=applicable.filter(t=>t.slot==='morning');
  const nightTasks=applicable.filter(t=>t.slot==='night');

  const parts=dateKey.split('-');
  let html=`<div class="detail-title">${parseInt(parts[1])}月${parseInt(parts[2])}日</div>`;

  function taskHTML(list){
    return list.map(t=>{
      const isDone=!!hist[t.id];
      const cls = isDone ? "detail-check done" : "detail-check";
      const chk = isDone ? "✓" : "";
      return "<div class=\"detail-task\"><div class=\"" + cls + "\">" + chk + "</div><div class=\"detail-name\">" + esc(t.name) + "</div></div>";
    }).join("");
  }
  if(morningTasks.length){
    html+=`<div class="slot-section"><div class="slot-label">🌅 朝</div>${taskHTML(morningTasks)}</div>`;
  }
  if(nightTasks.length){
    html+=`<div class="slot-section"><div class="slot-label">🌙 夜</div>${taskHTML(nightTasks)}</div>`;
  }
  if(!morningTasks.length&&!nightTasks.length){
    html+='<div style="color:var(--sub);font-size:13px;">タスクなし</div>';
  }
  detail.innerHTML=html;
  detail.classList.add('visible');
  detail.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function calMove(d){
  calMonth+=d;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  document.getElementById('dayDetail').classList.remove('visible');
  renderCalendar();
}

// ══════════════════════════════════════
//  MODAL
// ══════════════════════════════════════
function openAdd(){
  editId=null; formSlot=activeSlot; formDays=[];
  document.getElementById('sheetTitle').textContent='タスクを追加';
  document.getElementById('inpName').value='';
  document.getElementById('inpDur').value='';
  document.getElementById('btnDelete').style.display='none';
  syncChips();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('inpName').focus(),300);
}
function openEdit(id){
  const t=tasks.find(t=>t.id===id); if(!t)return;
  editId=id; formSlot=t.slot; formDays=[...t.days];
  document.getElementById('sheetTitle').textContent='タスクを編集';
  document.getElementById('inpName').value=t.name;
  document.getElementById('inpDur').value=t.duration||'';
  document.getElementById('btnDelete').style.display='block';
  syncChips();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay'))closeModal(); });

function pickSlot(btn){
  formSlot=btn.dataset.s;
  document.querySelectorAll('#chipSlot .chip').forEach(b=>b.classList.toggle('on',b.dataset.s===formSlot));
}
function toggleDay(btn){
  const d=parseInt(btn.dataset.d);
  if(formDays.includes(d))formDays=formDays.filter(x=>x!==d); else formDays.push(d);
  btn.classList.toggle('on',formDays.includes(d));
}
function syncChips(){
  document.querySelectorAll('#chipSlot .chip').forEach(b=>b.classList.toggle('on',b.dataset.s===formSlot));
  document.querySelectorAll('#chipDays .chip').forEach(b=>b.classList.toggle('on',formDays.includes(parseInt(b.dataset.d))));
}
function saveTask(){
  const name=document.getElementById('inpName').value.trim();
  if(!name){document.getElementById('inpName').focus();return;}
  const dur=parseInt(document.getElementById('inpDur').value)||0;
  if(editId){
    const i=tasks.findIndex(t=>t.id===editId);
    if(i>-1)tasks[i]={...tasks[i],name,duration:dur,slot:formSlot,days:[...formDays]};
  }else{
    tasks.push({id:Date.now().toString(),name,duration:dur,slot:formSlot,days:[...formDays]});
  }
  persist(); closeModal();
  if(formSlot!==activeSlot){activeSlot=formSlot;applyTheme(formSlot);}
  render();
}
function deleteTask(){
  if(!editId)return;
  if(!confirm('このタスクを削除しますか？'))return;
  tasks=tasks.filter(t=>t.id!==editId);
  if(currentTaskId===editId){stopTimer();currentTaskId=null;}
  persist(); closeModal(); render();
}

function esc(s){ const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

  if(tasks.length)return;
  [

    {slot:'morning',name:'白湯を飲む',duration:5,days:[]},
    {slot:'morning',name:'ストレッチ',duration:10,days:[]},
    {slot:'morning',name:'スキンケア',duration:5,days:[]},
    {slot:'night',name:'翌日タスク確認',duration:5,days:[]},
    {slot:'night',name:'ナイトスキンケア',duration:8,days:[]},
  ].forEach((s,i)=>tasks.push({...s,id:'s'+(i+1)}));
  persist();
}
